name: Clean IP blacklist (deduplicate)

on:
  push:
    paths:
      - "blacklist.txt"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean duplicates
        run: |
          sort blacklist.txt | uniq > blacklist_clean.txt
          mv blacklist_clean.txt blacklist.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blacklist.txt
          git diff --cached --quiet || git commit -m "Auto-clean duplicates"
          git push
