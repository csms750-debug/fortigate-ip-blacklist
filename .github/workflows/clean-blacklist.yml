name: Clean IP blacklist (deduplicate)

on:
  push:
    paths:
      - "blacklist.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean duplicates
        run: |
          sort blacklist.txt | uniq > tmp.txt
          mv tmp.txt blacklist.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add blacklist.txt

          git diff --cached --quiet && exit 0 || git commit -m "Auto-clean duplicates"

          git push
