name: Clean IP blacklist (deduplicate + remove empty lines)

on:
  push:
    paths:
      - "blacklist.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clean blacklist (remove empty lines + duplicates)
        run: |
          cat blacklist.txt \
          | sed '/^\s*$/d' \
          | sed 's/^[ \t]*//;s/[ \t]*$//' \
          | sort \
          | uniq \
          > tmp.txt

          mv tmp.txt blacklist.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add blacklist.txt

          git diff --cached --quiet && exit 0 || git commit -m "Auto-clean blacklist (dedup + remove empty lines)"

          git push
